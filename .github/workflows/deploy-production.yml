name: Deploy to Production

on:
  # Production is isolated from main branch pushes.
  # Deploy manually via GitHub Actions UI or by pushing a version tag.
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy-marketing-site-production:
    name: Deploy Marketing Site to Production
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: marketing-site/package-lock.json
    
    - name: Install dependencies
      working-directory: ./marketing-site
      run: npm ci
    
    - name: Build
      working-directory: ./marketing-site
      run: npm run cloudflare-build
    
    - name: Deploy to Cloudflare Workers (Production)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy
        workingDirectory: marketing-site
        wranglerVersion: 4.93.0

    # Best-effort: extends the maintenance banner (see announce-maintenance.yml
    # and src/lib/maintenance.ts) to stay visible for at least 2 hours after
    # this deploy. Never shortens an already-longer window, and never blocks
    # or fails the deploy above if it errors - a missing banner is cosmetic,
    # a blocked deploy isn't.
    - name: Extend maintenance banner window (best-effort)
      continue-on-error: true
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        workingDirectory: marketing-site
        wranglerVersion: 4.93.0
        command: >-
          d1 execute scratchsolid-marketing-db --remote --command
          "UPDATE content SET text = json_set(text, '$.end', strftime('%Y-%m-%dT%H:%M:%fZ','now','+2 hours')), updated_at = datetime('now') WHERE collection='settings' AND slug='maintenance-banner' AND json_extract(text,'$.end') < strftime('%Y-%m-%dT%H:%M:%fZ','now','+2 hours')"

  deploy-internal-portal-production:
    name: Deploy Internal Portal to Production
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: internal-portal/package-lock.json
    
    - name: Install dependencies
      working-directory: ./internal-portal
      run: npm install

    - name: Install Wrangler
      run: npm install -g wrangler@4.93.0

    - name: Clean build artifacts
      working-directory: ./internal-portal
      run: rm -rf .open-next .next node_modules/.cache

    - name: Build
      working-directory: ./internal-portal
      run: npm run cloudflare-build
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        NEXT_PUBLIC_ERP_URL: https://erp.scratchsolidsolutions.org

    - name: Deploy to Cloudflare Workers (Production)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy
        workingDirectory: internal-portal
        wranglerVersion: 4.93.0
      env:
        CLOUDFLARE_ACCOUNT_ID: b2a8cb0641daf69d84e59ec101d80edb

  deploy-backend-worker-production:
    name: Deploy Backend Worker to Production
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: backend-worker/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend-worker
      run: npm ci
    
    - name: Deploy to Cloudflare Workers (Production)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy
        workingDirectory: backend-worker
        wranglerVersion: 4.93.0
