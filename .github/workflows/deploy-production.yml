name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy-marketing-site-production:
    name: Deploy Marketing Site to Production
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: marketing-site/package-lock.json
    
    - name: Install dependencies
      working-directory: ./marketing-site
      run: npm ci
    
    - name: Build
      working-directory: ./marketing-site
      run: npm run cloudflare-build
    
    - name: Deploy to Cloudflare Workers (Production)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy
        workingDirectory: marketing-site
        wranglerVersion: 4.93.0

  deploy-internal-portal-production:
    name: Deploy Internal Portal to Production
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: internal-portal/package-lock.json
    
    - name: Install dependencies
      working-directory: ./internal-portal
      run: npm ci

    - name: Install Wrangler
      run: npm install -g wrangler@4.93.0

    - name: Clean build artifacts
      working-directory: ./internal-portal
      run: rm -rf .open-next .next node_modules/.cache

    - name: Build
      working-directory: ./internal-portal
      run: npm run cloudflare-build
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Deploy to Cloudflare Workers (Production)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy --env production
        workingDirectory: internal-portal
        wranglerVersion: 4.93.0
      env:
        CLOUDFLARE_ACCOUNT_ID: b2a8cb0641daf69d84e59ec101d80edb

  deploy-backend-worker-production:
    name: Deploy Backend Worker to Production
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: backend-worker/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend-worker
      run: npm ci
    
    - name: Deploy to Cloudflare Workers (Production)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy
        workingDirectory: backend-worker
        wranglerVersion: 4.93.0
