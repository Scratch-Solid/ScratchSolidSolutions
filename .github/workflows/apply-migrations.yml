name: Apply D1 Migrations

# Manual-only: migrations are never auto-applied on push/tag - a schema
# change against a real D1 database is deliberate every time, triggered by
# hand via the Actions UI or `gh workflow run`, never as a side effect of
# a code deploy.
on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app D1 database'
        required: true
        type: choice
        options:
          - internal-portal
          - marketing-site
      target:
        description: 'Which database to apply pending migrations against'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  apply-migrations:
    name: Apply D1 migrations (${{ github.event.inputs.app }} / ${{ github.event.inputs.target }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Wrangler
      run: npm install -g wrangler@4.93.0

    - name: Apply migrations (staging)
      if: github.event.inputs.target == 'staging'
      working-directory: ${{ github.event.inputs.app }}
      run: wrangler d1 migrations apply scratchsolid_db --env staging --remote
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Apply migrations (production)
      if: github.event.inputs.target == 'production'
      working-directory: ${{ github.event.inputs.app }}
      run: wrangler d1 migrations apply scratchsolid_db --remote
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
