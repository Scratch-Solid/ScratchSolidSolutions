name: Nightly Selenium Regression

on:
  schedule:
    # Run every night at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  marketing-selenium:
    name: Marketing Site Selenium Regression
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: marketing-site/package-lock.json

    - name: Install dependencies
      working-directory: ./marketing-site
      run: npm ci

    - name: Run Selenium smoke tests
      working-directory: ./marketing-site
      run: npm run test:selenium
      env:
        BASE_URL: https://scratchsolidsolutions.org
        PORTAL_URL: https://portal.scratchsolidsolutions.org

    - name: Upload Selenium test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: selenium-test-results
        path: |
          marketing-site/test-results/
          marketing-site/tests/selenium/
        retention-days: 7

  report:
    name: Compile Regression Report
    runs-on: ubuntu-latest
    needs: [marketing-selenium]
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Post summary
      run: |
        echo "## Nightly Selenium Regression Report" >> $GITHUB_STEP_SUMMARY
        echo "- Marketing Site: tested against production" >> $GITHUB_STEP_SUMMARY
        echo "- Artifacts available for download" >> $GITHUB_STEP_SUMMARY

  alert-on-failure:
    name: Alert on Failure
    runs-on: ubuntu-latest
    needs: [marketing-selenium]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create or update production alert issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "production-alert" --state open --search "Nightly Selenium Regression failed" --json number --jq '.[0].number')
          BODY="Nightly Selenium Regression failed against production.

          Run: $RUN_URL
          Time: $(date -u +"%Y-%m-%d %H:%M UTC")

          Check the run logs and the uploaded selenium-test-results artifact for details."
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "🔴 Nightly Selenium Regression failed" --body "$BODY" --label "production-alert"
          fi
