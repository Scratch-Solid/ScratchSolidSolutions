name: Deploy to Staging

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

jobs:
  deploy-marketing-site-staging:
    name: Deploy Marketing Site to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: marketing-site/package-lock.json
    
    - name: Install dependencies
      working-directory: ./marketing-site
      run: npm install
    
    - name: Install Wrangler
      run: npm install -g wrangler@4.93.0
    
    - name: Build
      working-directory: ./marketing-site
      run: npm run cloudflare-build
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    - name: Deploy to Cloudflare Workers (Staging)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy --env staging
        workingDirectory: marketing-site
        wranglerVersion: 4.93.0
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-internal-portal-staging:
    name: Deploy Internal Portal to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: internal-portal/package-lock.json

    - name: Install dependencies
      working-directory: ./internal-portal
      run: npm install

    - name: Install Wrangler
      run: npm install -g wrangler@4.93.0

    - name: Build with OpenNext
      working-directory: ./internal-portal
      run: npm run cloudflare-build
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Deploy to Cloudflare Workers (Staging)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy --env staging
        workingDirectory: internal-portal
        wranglerVersion: 4.93.0
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-backend-worker-staging:
    name: Deploy Backend Worker to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: backend-worker/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend-worker
      run: npm ci

    - name: Install Wrangler
      run: npm install -g wrangler@4.93.0
    
    - name: Unassign conflicting route from marketing worker
      working-directory: ./backend-worker
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        node -e '
        const https = require("https");
        const token = process.env.CLOUDFLARE_API_TOKEN;
        
        function request(url, method = "GET") {
          return new Promise((resolve, reject) => {
            const urlObj = new URL(url);
            const options = {
              hostname: urlObj.hostname,
              path: urlObj.pathname + urlObj.search,
              method: method,
              headers: {
                "Authorization": "Bearer " + token
              }
            };
            const req = https.request(options, (res) => {
              let data = "";
              res.on("data", chunk => data += chunk);
              res.on("end", () => resolve(data));
            });
            req.on("error", reject);
            req.end();
          });
        }
        
        (async () => {
          const zones = JSON.parse(await request("https://api.cloudflare.com/client/v4/zones?name=scratchsolidsolutions.org"));
          const zoneId = zones.result[0].id;
          const routes = JSON.parse(await request("https://api.cloudflare.com/client/v4/zones/" + zoneId + "/workers/routes"));
          const route = routes.result.find(r => r.pattern === "api-staging.scratchsolidsolutions.org/*");
          if (route) {
            await request("https://api.cloudflare.com/client/v4/zones/" + zoneId + "/workers/routes/" + route.id, "DELETE");
            console.log("Unassigned api-staging route from marketing worker");
          } else {
            console.log("No conflicting route found, skipping");
          }
        })();
        '
    - name: Deploy to Cloudflare Workers (Staging)
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        command: deploy --env staging
        workingDirectory: backend-worker
        wranglerVersion: 4.93.0
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
