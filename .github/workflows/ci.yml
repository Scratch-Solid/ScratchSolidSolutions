name: CI

on:
  push:
    branches: [ main, staging, develop ]
  pull_request:
    branches: [ main, staging, develop ]

jobs:
  marketing-site:
    name: Marketing Site - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: marketing-site/package-lock.json
    
    - name: Install dependencies
      working-directory: ./marketing-site
      run: npm ci
    
    - name: Run linter
      working-directory: ./marketing-site
      run: npm run lint || true
    
    - name: Run unit tests
      working-directory: ./marketing-site
      run: npm test
    
    - name: Install Playwright browsers
      working-directory: ./marketing-site
      run: npx playwright install --with-deps chromium

    - name: Run Playwright E2E tests
      working-directory: ./marketing-site
      run: npx playwright test --project=chromium || true
      env:
        CI: true

    - name: Run Selenium tests
      working-directory: ./marketing-site
      run: npm run test:selenium || true
      env:
        CI: true
    
    - name: Build
      working-directory: ./marketing-site
      run: npm run build
    
    - name: Security audit
      working-directory: ./marketing-site
      run: npm audit --audit-level=high

  internal-portal:
    name: Internal Portal - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: internal-portal/package-lock.json
    
    - name: Install dependencies
      working-directory: ./internal-portal
      run: npm install
    
    - name: Run unit tests
      working-directory: ./internal-portal
      run: npm test

    - name: Install Playwright browsers
      working-directory: ./internal-portal
      run: npx playwright install --with-deps chromium

    - name: Run Playwright E2E tests
      working-directory: ./internal-portal
      run: npx playwright test --project=chromium || true
      env:
        CI: true
    
    - name: Build
      working-directory: ./internal-portal
      run: npm run build
    
    - name: Security audit
      working-directory: ./internal-portal
      run: npm audit --audit-level=high

  backend-worker:
    name: Backend Worker - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: backend-worker/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend-worker
      run: npm ci
    
    - name: Security audit
      working-directory: ./backend-worker
      run: npm audit --audit-level=high
