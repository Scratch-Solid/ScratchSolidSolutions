name: Deploy Internal Portal

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'internal-portal/**'
      - '.github/workflows/deploy-internal-portal.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Internal Portal
    
    defaults:
      run:
        working-directory: internal-portal
    
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'internal-portal/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build with OpenNext.js
        run: npm run cloudflare-build
      
      - name: Deploy to Cloudflare Workers
        run: opennextjs-cloudflare deploy
