name: Dump D1 Table Schema

# One-off diagnostic: runs a read-only SELECT against a chosen
# database/environment - either a schema dump (leave `query` blank, fill in
# `tables`) or an arbitrary ad-hoc SELECT (fill in `query`, leave `tables`
# blank). Exists because this environment's migration files have
# repeatedly not matched what's actually live (see project memory on D1
# schema drift) - use this before trusting any migration file as ground
# truth. Deliberately not wired to accept destructive statements from any
# automated caller - only run SELECTs here.
on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app D1 database'
        required: true
        type: choice
        options:
          - internal-portal
          - marketing-site
      target:
        description: 'staging or production'
        required: true
        type: choice
        options:
          - staging
          - production
      tables:
        description: 'Comma-separated table names (schema-dump mode - ignored if query is set)'
        required: false
        type: string
        default: ''
      query:
        description: 'Ad-hoc read-only SQL query (overrides tables mode if set)'
        required: false
        type: string
        default: ''

jobs:
  dump-schema:
    name: Dump schema (${{ github.event.inputs.app }} / ${{ github.event.inputs.target }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Wrangler
      run: npm install -g wrangler@4.93.0

    - name: Build SQL command
      id: sql
      run: |
        QUERY="${{ github.event.inputs.query }}"
        if [ -n "$QUERY" ]; then
          echo "final_query=$QUERY" >> "$GITHUB_OUTPUT"
        else
          TABLES="${{ github.event.inputs.tables }}"
          IN_CLAUSE=$(echo "$TABLES" | sed "s/,/','/g")
          echo "final_query=SELECT name, sql FROM sqlite_master WHERE type='table' AND name IN ('$IN_CLAUSE')" >> "$GITHUB_OUTPUT"
        fi

    - name: Run query (staging)
      if: github.event.inputs.target == 'staging'
      working-directory: ${{ github.event.inputs.app }}
      run: wrangler d1 execute scratchsolid_db --env staging --remote --command "${{ steps.sql.outputs.final_query }}"
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Run query (production)
      if: github.event.inputs.target == 'production'
      working-directory: ${{ github.event.inputs.app }}
      run: wrangler d1 execute scratchsolid_db --remote --command "${{ steps.sql.outputs.final_query }}"
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
