name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy-marketing:
    runs-on: ubuntu-latest
    name: Deploy Marketing Site
    defaults:
      run:
        working-directory: marketing-site
    env:
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: marketing-site/package-lock.json

      - run: npm ci
      - name: Build and deploy with OpenNext
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
        env:
          NEXT_PUBLIC_BASE_URL: https://scratchsolidsolutions.org
          NEXT_PUBLIC_API_URL: https://scratchsolidsolutions.org
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-portal:
    runs-on: ubuntu-latest
    name: Deploy Internal Portal
    defaults:
      run:
        working-directory: internal-portal
    env:
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: internal-portal/package-lock.json
