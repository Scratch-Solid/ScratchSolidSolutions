name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy-marketing:
    runs-on: ubuntu-latest
    name: Deploy Marketing Site
    defaults:
      run:
        working-directory: marketing-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: marketing-site/package-lock.json

      - run: npm ci
      - run: npx opennextjs-cloudflare build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=scratchsolidsolutions
          workingDirectory: marketing-site

  deploy-portal:
    runs-on: ubuntu-latest
    name: Deploy Internal Portal
    defaults:
      run:
        working-directory: internal-portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: internal-portal/package-lock.json

      - run: npm ci
      - run: npx opennextjs-cloudflare build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=scratchsolid-portal
          workingDirectory: internal-portal

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend Worker
    defaults:
      run:
        working-directory: backend-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-worker/package-lock.json

      - run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: backend-worker
