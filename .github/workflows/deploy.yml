name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy-marketing:
    runs-on: ubuntu-latest
    name: Deploy Marketing Site
    defaults:
      run:
        working-directory: marketing-site
    env:
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: marketing-site/package-lock.json

      - run: npm ci --legacy-peer-deps
      - name: Apply D1 schema
        run: npx wrangler d1 execute scratchsolid-db --remote --file=schema.sql --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Run D1 migration - email verification
        continue-on-error: true
        run: npx wrangler d1 execute scratchsolid-db --remote --file=migrations/add_email_verification.sql --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Run D1 migration - about us tables
        continue-on-error: true
        run: npx wrangler d1 execute scratchsolid-db --remote --file=migrations/add_about_us_tables.sql --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Run D1 migration - fix about us schema
        continue-on-error: true
        run: npx wrangler d1 execute scratchsolid-db --remote --file=migrations/fix_about_us_schema.sql --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Run D1 migration - fix ai_responses columns
        continue-on-error: true
        run: npx wrangler d1 execute scratchsolid-db --remote --file=migrations/004_fix_ai_responses_columns.sql --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Build and deploy with OpenNext
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
        env:
          NEXT_PUBLIC_BASE_URL: https://scratchsolidsolutions.org
          NEXT_PUBLIC_API_URL: https://scratchsolidsolutions.org
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-portal:
    runs-on: ubuntu-latest
    name: Deploy Internal Portal
    defaults:
      run:
        working-directory: internal-portal
    env:
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: internal-portal/package-lock.json

      - run: npm ci --legacy-peer-deps
      - name: Build and deploy with OpenNext
        run: npx opennextjs-cloudflare build && npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend Worker
    defaults:
      run:
        working-directory: backend-worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-worker/package-lock.json

      - run: npm ci --legacy-peer-deps
      - name: Deploy with Wrangler
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
