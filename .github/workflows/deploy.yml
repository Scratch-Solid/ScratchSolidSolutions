name: Deploy to Cloudflare

on:
  push:
    branches: [main, staging]

env:
  DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
  MARKETING_BASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://scratchsolidsolutions.org' || 'https://staging.scratchsolidsolutions.org' }}
  MARKETING_API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.scratchsolidsolutions.org' || 'https://api-staging.scratchsolidsolutions.org' }}
  PORTAL_BASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://portal.scratchsolidsolutions.org' || 'https://portal-staging.scratchsolidsolutions.org' }}

jobs:
  deploy-marketing:
    runs-on: ubuntu-latest
    name: Deploy Marketing Site
    defaults:
      run:
        working-directory: marketing-site
    env:
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: marketing-site/package-lock.json

      - run: npm ci --legacy-peer-deps
      - name: Build and deploy with OpenNext
        run: npx opennextjs-cloudflare build && npx wrangler pages deploy .open-next --env ${{ env.DEPLOY_ENV }}
        env:
          NEXT_PUBLIC_BASE_URL: ${{ env.MARKETING_BASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ env.MARKETING_API_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-portal:
    runs-on: ubuntu-latest
    name: Deploy Internal Portal
    defaults:
      run:
        working-directory: internal-portal
    env:
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: internal-portal/package-lock.json

      - run: npm ci --legacy-peer-deps
      - name: Build and deploy with OpenNext
        run: npx opennextjs-cloudflare build && npx wrangler pages deploy .open-next --env ${{ env.DEPLOY_ENV }}
        env:
          NEXT_PUBLIC_BASE_URL: ${{ env.PORTAL_BASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend Worker
    defaults:
      run:
        working-directory: backend-worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-worker/package-lock.json

      - run: npm ci --legacy-peer-deps
      - name: Deploy with Wrangler
        run: npx wrangler deploy --env ${{ env.DEPLOY_ENV }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
