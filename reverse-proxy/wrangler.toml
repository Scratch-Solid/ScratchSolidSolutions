name = "scratchsolid-reverse-proxy"
main = "worker.js"
compatibility_date = "2026-04-19"

# KV namespace for edge caching
[[kv_namespaces]]
binding = "CACHE_KV"
id = "8277d6081cb447d4831d100270a25d5b"

# KV namespace for distributed rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "859744ffa6fc44caa84edaaa1e481800"

[env.production]
name = "scratchsolid-proxy-prod"

[[env.production.kv_namespaces]]
binding = "CACHE_KV"
id = "8277d6081cb447d4831d100270a25d5b"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "859744ffa6fc44caa84edaaa1e481800"
