version: "3.8"

# ScratchSolid 2.0 — Unified Infrastructure Stack
# Services: Traefik (SSL), Cal.com (Booking), n8n (Orchestration), ERPNext (Workforce)
# Deploy: cp .env.example .env && ./setup.sh
#
# Minimum Server Spec: 4 vCPU, 8GB RAM, 100GB SSD, Ubuntu 22.04 LTS
#
# mem_limit values below are hard caps (not reservations) sized against a
# 3.7GB host with no per-container limits previously set at all - any one
# runaway container could exhaust host memory and OOM-kill its neighbors
# unpredictably. Caps intentionally sum higher than total RAM (standard
# overcommit practice) since real usage per container is far below its cap;
# the 2GB swap file added alongside this is the safety net for legitimate
# temporary spikes.

services:
  # ═══════════════════════════════════════════════════════════════
  #  REVERSE PROXY & SSL TERMINATION
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v2.11
    container_name: scratch_traefik
    restart: always
    mem_limit: 256m
    command:
      - "--api.dashboard=false"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@scratchsolidsolutions.org}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - scratch_public
      - scratch_internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════
  #  CAL.COM — SCHEDULING ENGINE
  # ═══════════════════════════════════════════════════════════════
  calcom-postgres:
    image: postgres:15-alpine
    container_name: calcom_db
    restart: always
    mem_limit: 256m
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${CALCOM_DB_USER:-scratch_admin}
      POSTGRES_PASSWORD: ${CALCOM_DB_PASSWORD}
      POSTGRES_DB: ${CALCOM_DB_NAME:-calcom}
    volumes:
      - calcom_db_data:/var/lib/postgresql/data
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CALCOM_DB_USER:-scratch_admin} -d ${CALCOM_DB_NAME:-calcom}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  calcom-web:
    image: calcom/cal.com:v6.1.13
    container_name: calcom_engine
    restart: always
    mem_limit: 1536m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calcom.rule=Host(`booking.scratchsolidsolutions.org`)"
      - "traefik.http.routers.calcom.tls.certresolver=letsencrypt"
      - "traefik.http.routers.calcom.entrypoints=websecure"
      - "traefik.http.services.calcom.loadbalancer.server.port=3000"
    environment:
      NEXT_PUBLIC_WEBAPP_URL: ${CALCOM_WEBAPP_URL:-https://booking.scratchsolidsolutions.org}
      NEXTAUTH_SECRET: ${CALCOM_NEXTAUTH_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPTION_KEY}
      DATABASE_URL: postgresql://${CALCOM_DB_USER:-scratch_admin}:${CALCOM_DB_PASSWORD}@calcom-postgres:5432/${CALCOM_DB_NAME:-calcom}
      DATABASE_DIRECT_URL: postgresql://${CALCOM_DB_USER:-scratch_admin}:${CALCOM_DB_PASSWORD}@calcom-postgres:5432/${CALCOM_DB_NAME:-calcom}
      NODE_ENV: production
      # Required for Cal.com self-hosted
      EMAIL_FROM: ${EMAIL_FROM:-noreply@scratchsolidsolutions.org}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-smtp.resend.com}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-resend}
      EMAIL_SERVER_PASSWORD: ${RESEND_API_KEY}
    depends_on:
      calcom-postgres:
        condition: service_healthy
    networks:
      - scratch_internal
      - scratch_public

  # ═══════════════════════════════════════════════════════════════
  #  N8N — WORKFLOW ORCHESTRATION ENGINE
  # ═══════════════════════════════════════════════════════════════
  n8n-postgres:
    image: postgres:15-alpine
    container_name: n8n_db
    restart: always
    mem_limit: 256m
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  n8n:
    image: docker.n8n.io/n8nio/n8n:1.45.0
    container_name: n8n_orchestrator
    restart: always
    mem_limit: 512m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.scratchsolidsolutions.org`)"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      # Optional: IP whitelist for n8n UI
      # - "traefik.http.middlewares.n8n-whitelist.ipallowlistsourcerange=${N8N_IP_WHITELIST:-0.0.0.0/0}"
      # - "traefik.http.routers.n8n.middlewares=n8n-whitelist"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-scratchadmin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.scratchsolidsolutions.org/}
      GENERIC_TIMEZONE: ${TZ:-Africa/Johannesburg}
      # Execution persistence
      EXECUTIONS_MODE: regular
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: true
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - scratch_internal
      - scratch_public
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════
  #  ERPNEXT — WORKFORCE & PAYROLL
  # ═══════════════════════════════════════════════════════════════
  erpnext-backend:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_backend
    restart: always
    mem_limit: 768m
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: erpnext-db
      DB_PORT: "3306"
      REDIS_CACHE: redis://erpnext-redis-cache:6379/0
      REDIS_QUEUE: redis://erpnext-redis-queue:6379/0
      REDIS_SOCKETIO: redis://erpnext-redis-socketio:6379/0
      SOCKETIO_PORT: "9000"
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-H", "Host: scratchsolid.local", "http://localhost:8000/api/method/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # nginx frontend — serves /assets static files directly and proxies
  # dynamic requests to the backend/websocket. Without this, Traefik hits
  # gunicorn directly, which doesn't serve static assets (404s on all CSS/JS).
  erpnext-frontend:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_frontend
    restart: always
    mem_limit: 256m
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: erpnext-backend:8000
      SOCKETIO: erpnext-websocket:9000
      FRAPPE_SITE_NAME_HEADER: scratchsolid.local
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erpnext.rule=Host(`erp.scratchsolidsolutions.org`)"
      - "traefik.http.routers.erpnext.tls.certresolver=letsencrypt"
      - "traefik.http.routers.erpnext.entrypoints=websecure"
      - "traefik.http.services.erpnext.loadbalancer.server.port=8080"
      # Frappe sends X-Frame-Options: SAMEORIGIN by default, which blocks the
      # internal-portal's ERP Console iframe (a different origin). Modern
      # browsers prefer CSP frame-ancestors over X-Frame-Options when both are
      # present, so this allows embedding from the portal specifically without
      # opening it up to arbitrary sites.
      - "traefik.http.middlewares.erpnext-frame-ancestors.headers.customresponseheaders.Content-Security-Policy=frame-ancestors 'self' https://portal.scratchsolidsolutions.org"
      - "traefik.http.routers.erpnext.middlewares=erpnext-frame-ancestors"
    depends_on:
      erpnext-backend:
        condition: service_healthy
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8080/api/method/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  erpnext-websocket:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_websocket
    restart: always
    mem_limit: 256m
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-backend:
        condition: service_healthy
    networks:
      - scratch_internal

  erpnext-queue-default:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_queue_default
    restart: always
    mem_limit: 256m
    command: bench worker --queue default
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - scratch_internal
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-queue-short:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_queue_short
    restart: always
    mem_limit: 256m
    command: bench worker --queue short
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - scratch_internal
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-queue-long:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_queue_long
    restart: always
    mem_limit: 256m
    command: bench worker --queue long
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - scratch_internal
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-scheduler:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_scheduler
    restart: always
    mem_limit: 256m
    command: bench schedule
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - scratch_internal
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-db:
    image: mariadb:10.6
    container_name: erpnext_db
    restart: always
    mem_limit: 768m
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${ERPNEXT_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ERPNEXT_DB_NAME}
    volumes:
      - erpnext_db_data:/var/lib/mysql
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${ERPNEXT_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  erpnext-redis-cache:
    image: redis:7-alpine
    container_name: erpnext_redis_cache
    restart: always
    mem_limit: 96m
    volumes:
      - erpnext_redis_cache_data:/data
    networks:
      - scratch_internal

  erpnext-redis-queue:
    image: redis:7-alpine
    container_name: erpnext_redis_queue
    restart: always
    mem_limit: 96m
    volumes:
      - erpnext_redis_queue_data:/data
    networks:
      - scratch_internal

  erpnext-redis-socketio:
    image: redis:7-alpine
    container_name: erpnext_redis_socketio
    restart: always
    mem_limit: 96m
    volumes:
      - erpnext_redis_socketio_data:/data
    networks:
      - scratch_internal

  # ═══════════════════════════════════════════════════════════════
  #  BACKUP SERVICE — Daily database dumps to Cloudflare R2
  # ═══════════════════════════════════════════════════════════════
  backup:
    image: postgres:15-alpine
    container_name: scratch_backup
    restart: unless-stopped
    mem_limit: 128m
    environment:
      CALCOM_DB_PASSWORD: ${CALCOM_DB_PASSWORD}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD}
      ERPNEXT_DB_ROOT_PASSWORD: ${ERPNEXT_DB_ROOT_PASSWORD}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-scratchsolid-backups}
      R2_ENDPOINT: ${R2_ENDPOINT}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - backup_data:/backups
      - ./scripts:/scripts:ro
    command: >
      sh -c "
        apk add --no-cache curl python3 py3-pip 2>/dev/null || true;
        pip3 install awscli 2>/dev/null || true;
        chmod +x /scripts/backup.sh;
        while true; do
          /scripts/backup.sh;
          sleep 86400;
        done
      "
    depends_on:
      - calcom-postgres
      - n8n-postgres
      - erpnext-db
    networks:
      - scratch_internal

  # ═══════════════════════════════════════════════════════════════
  #  UPTIME KUMA — Monitoring & alerting dashboard
  # ═══════════════════════════════════════════════════════════════
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.13
    container_name: scratch_uptime_kuma
    restart: always
    mem_limit: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`status.scratchsolidsolutions.org`)"
      - "traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - scratch_internal
      - scratch_public
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:3001/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ═════════════════════════════════════════════════════════════════
#  VOLUMES
# ═════════════════════════════════════════════════════════════════
volumes:
  traefik_certs:
  calcom_db_data:
  n8n_db_data:
  n8n_storage:
  erpnext_sites:
  erpnext_logs:
  erpnext_db_data:
  erpnext_redis_cache_data:
  erpnext_redis_queue_data:
  erpnext_redis_socketio_data:
  backup_data:
  uptime_kuma_data:

# ═════════════════════════════════════════════════════════════════
#  NETWORKS
# ═════════════════════════════════════════════════════════════════
networks:
  scratch_public:
    driver: bridge
  scratch_internal:
    driver: bridge
    internal: true
