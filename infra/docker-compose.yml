version: "3.8"

# ScratchSolid 2.0 — Unified Infrastructure Stack
# Services: Traefik (SSL), Cal.com (Booking), n8n (Orchestration), ERPNext (Workforce)
# Deploy: cp .env.example .env && ./setup.sh
#
# Minimum Server Spec: 4 vCPU, 8GB RAM, 100GB SSD, Ubuntu 22.04 LTS

services:
  # ═══════════════════════════════════════════════════════════════
  #  REVERSE PROXY & SSL TERMINATION
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v2.11
    container_name: scratch_traefik
    restart: always
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@scratchsolidsolutions.org}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - scratch_public
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════
  #  CAL.COM — SCHEDULING ENGINE
  # ═══════════════════════════════════════════════════════════════
  calcom-postgres:
    image: postgres:15-alpine
    container_name: calcom_db
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${CALCOM_DB_USER:-scratch_admin}
      POSTGRES_PASSWORD: ${CALCOM_DB_PASSWORD}
      POSTGRES_DB: ${CALCOM_DB_NAME:-calcom}
    volumes:
      - calcom_db_data:/var/lib/postgresql/data
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CALCOM_DB_USER:-scratch_admin} -d ${CALCOM_DB_NAME:-calcom}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  calcom-web:
    image: calcom/cal.com:v3.9.3
    container_name: calcom_engine
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calcom.rule=Host(`booking.scratchsolidsolutions.org`)"
      - "traefik.http.routers.calcom.tls.certresolver=letsencrypt"
      - "traefik.http.routers.calcom.entrypoints=websecure"
      - "traefik.http.services.calcom.loadbalancer.server.port=3000"
    environment:
      NEXT_PUBLIC_WEBAPP_URL: ${CALCOM_WEBAPP_URL:-https://booking.scratchsolidsolutions.org}
      NEXTAUTH_SECRET: ${CALCOM_NEXTAUTH_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPTION_KEY}
      DATABASE_URL: postgresql://${CALCOM_DB_USER:-scratch_admin}:${CALCOM_DB_PASSWORD}@calcom-postgres:5432/${CALCOM_DB_NAME:-calcom}
      NODE_ENV: production
      # Required for Cal.com self-hosted
      EMAIL_FROM: ${EMAIL_FROM:-noreply@scratchsolidsolutions.org}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-smtp.resend.com}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-resend}
      EMAIL_SERVER_PASSWORD: ${RESEND_API_KEY}
    depends_on:
      calcom-postgres:
        condition: service_healthy
    networks:
      - scratch_internal
      - scratch_public

  # ═══════════════════════════════════════════════════════════════
  #  N8N — WORKFLOW ORCHESTRATION ENGINE
  # ═══════════════════════════════════════════════════════════════
  n8n-postgres:
    image: postgres:15-alpine
    container_name: n8n_db
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n} -d ${N8N_DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  n8n:
    image: docker.n8n.io/n8nio/n8n:1.45.0
    container_name: n8n_orchestrator
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.scratchsolidsolutions.org`)"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      # Optional: IP whitelist for n8n UI
      # - "traefik.http.middlewares.n8n-whitelist.ipallowlistsourcerange=${N8N_IP_WHITELIST:-0.0.0.0/0}"
      # - "traefik.http.routers.n8n.middlewares=n8n-whitelist"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-scratchadmin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.scratchsolidsolutions.org/}
      GENERIC_TIMEZONE: ${TZ:-Africa/Johannesburg}
      # Execution persistence
      EXECUTIONS_MODE: regular
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: true
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      n8n-postgres:
        condition: service_healthy
    networks:
      - scratch_internal
      - scratch_public
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════
  #  ERPNEXT — WORKFORCE & PAYROLL
  # ═══════════════════════════════════════════════════════════════
  erpnext-backend:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_backend
    restart: always
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: erpnext-db
      DB_PORT: "3306"
      REDIS_CACHE: redis://erpnext-redis-cache:6379/0
      REDIS_QUEUE: redis://erpnext-redis-queue:6379/0
      REDIS_SOCKETIO: redis://erpnext-redis-socketio:6379/0
      SOCKETIO_PORT: "9000"
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/api/method/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  erpnext-frontend:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_frontend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erpnext.rule=Host(`erp.scratchsolidsolutions.org`)"
      - "traefik.http.routers.erpnext.tls.certresolver=letsencrypt"
      - "traefik.http.routers.erpnext.entrypoints=websecure"
      - "traefik.http.services.erpnext.loadbalancer.server.port=8080"
    deploy:
      restart_policy:
        condition: on-failure
    command: nginx-entrypoint
    environment:
      BACKEND: erpnext-backend:8000
      FRAPPE_SITE_NAME_HEADER: ${ERPNEXT_SITE_NAME:-scratchsolid.local}
      SOCKETIO: erpnext-websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites:ro
    networks:
      - scratch_internal
      - scratch_public
    depends_on:
      erpnext-backend:
        condition: service_healthy
      erpnext-websocket:
        condition: service_started

  erpnext-websocket:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_websocket
    restart: always
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    networks:
      - scratch_internal

  erpnext-queue-default:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_queue_default
    restart: always
    command: bench worker --queue default
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - scratch_internal
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-queue-short:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_queue_short
    restart: always
    command: bench worker --queue short
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - scratch_internal
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-queue-long:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_queue_long
    restart: always
    command: bench worker --queue long
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - scratch_internal
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-scheduler:
    image: frappe/erpnext:v15.30.0
    container_name: erpnext_scheduler
    restart: always
    command: bench schedule
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - scratch_internal
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-db:
    image: mariadb:10.6
    container_name: erpnext_db
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${ERPNEXT_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ERPNEXT_DB_NAME}
    volumes:
      - erpnext_db_data:/var/lib/mysql
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${ERPNEXT_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  erpnext-redis-cache:
    image: redis:7-alpine
    container_name: erpnext_redis_cache
    restart: always
    volumes:
      - erpnext_redis_cache_data:/data
    networks:
      - scratch_internal

  erpnext-redis-queue:
    image: redis:7-alpine
    container_name: erpnext_redis_queue
    restart: always
    volumes:
      - erpnext_redis_queue_data:/data
    networks:
      - scratch_internal

  erpnext-redis-socketio:
    image: redis:7-alpine
    container_name: erpnext_redis_socketio
    restart: always
    volumes:
      - erpnext_redis_socketio_data:/data
    networks:
      - scratch_internal

  # ═══════════════════════════════════════════════════════════════
  #  BACKUP SERVICE — Daily database dumps to Cloudflare R2
  # ═══════════════════════════════════════════════════════════════
  backup:
    image: postgres:15-alpine
    container_name: scratch_backup
    restart: unless-stopped
    environment:
      CALCOM_DB_PASSWORD: ${CALCOM_DB_PASSWORD}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD}
      ERPNEXT_DB_ROOT_PASSWORD: ${ERPNEXT_DB_ROOT_PASSWORD}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-scratchsolid-backups}
      R2_ENDPOINT: ${R2_ENDPOINT}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - backup_data:/backups
      - ./scripts:/scripts:ro
    command: >
      sh -c "
        apk add --no-cache curl python3 py3-pip 2>/dev/null || true;
        pip3 install awscli 2>/dev/null || true;
        chmod +x /scripts/backup.sh;
        while true; do
          /scripts/backup.sh;
          sleep 86400;
        done
      "
    depends_on:
      - calcom-postgres
      - n8n-postgres
      - erpnext-db
    networks:
      - scratch_internal

  # ═══════════════════════════════════════════════════════════════
  #  UPTIME KUMA — Monitoring & alerting dashboard
  # ═══════════════════════════════════════════════════════════════
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.13
    container_name: scratch_uptime_kuma
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`status.scratchsolidsolutions.org`)"
      - "traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - scratch_internal
      - scratch_public
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════
  #  MARKETING SITE — Public Next.js app (migrated off Cloudflare)
  # ═══════════════════════════════════════════════════════════════
  marketing-postgres:
    image: postgres:15-alpine
    container_name: marketing_db
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${MARKETING_DB_USER:-marketing}
      POSTGRES_PASSWORD: ${MARKETING_DB_PASSWORD}
      POSTGRES_DB: ${MARKETING_DB_NAME:-marketing}
    volumes:
      - marketing_db_data:/var/lib/postgresql/data
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MARKETING_DB_USER:-marketing} -d ${MARKETING_DB_NAME:-marketing}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  marketing-redis:
    image: redis:7-alpine
    container_name: marketing_redis
    restart: always
    volumes:
      - marketing_redis_data:/data
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  marketing-web:
    build:
      context: ../marketing-site
      dockerfile: Dockerfile
    image: scratchsolid-web:latest
    container_name: marketing_web
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marketing.rule=Host(`scratchsolidsolutions.org`) || Host(`www.scratchsolidsolutions.org`)"
      - "traefik.http.routers.marketing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.marketing.entrypoints=websecure"
      - "traefik.http.services.marketing.loadbalancer.server.port=3000"
      # Redirect www.* -> apex
      - "traefik.http.middlewares.marketing-www.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.marketing-www.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.marketing-www.redirectregex.permanent=true"
      - "traefik.http.routers.marketing.middlewares=marketing-www"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://${MARKETING_DB_USER:-marketing}:${MARKETING_DB_PASSWORD}@marketing-postgres:5432/${MARKETING_DB_NAME:-marketing}
      REDIS_URL: redis://marketing-redis:6379
      # Object storage (Cloudflare R2 over the S3 API, or self-hosted MinIO)
      S3_ENDPOINT: ${R2_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      S3_BUCKET: ${MARKETING_UPLOADS_BUCKET:-scratchsolid-uploads}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-https://uploads.scratchsolidsolutions.org}
      # Public URLs
      NEXT_PUBLIC_BASE_URL: ${MARKETING_BASE_URL:-https://scratchsolidsolutions.org}
      NEXT_PUBLIC_API_URL: ${MARKETING_API_URL:-https://api.scratchsolidsolutions.org/api}
      # Auth / integrations
      JWT_SECRET: ${JWT_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ZOHO_ORG_ID: ${ZOHO_ORG_ID:-}
      ZOHO_CLIENT_ID: ${ZOHO_CLIENT_ID:-}
      ZOHO_CLIENT_SECRET: ${ZOHO_CLIENT_SECRET:-}
      ZOHO_REFRESH_TOKEN: ${ZOHO_REFRESH_TOKEN:-}
    depends_on:
      marketing-postgres:
        condition: service_healthy
      marketing-redis:
        condition: service_started
    networks:
      - scratch_internal
      - scratch_public

  # ═══════════════════════════════════════════════════════════════
  #  INTERNAL PORTAL — Staff/admin/cleaner Next.js app
  # ═══════════════════════════════════════════════════════════════
  portal-postgres:
    image: postgres:15-alpine
    container_name: portal_db
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${PORTAL_DB_USER:-portal}
      POSTGRES_PASSWORD: ${PORTAL_DB_PASSWORD}
      POSTGRES_DB: ${PORTAL_DB_NAME:-portal}
    volumes:
      - portal_db_data:/var/lib/postgresql/data
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PORTAL_DB_USER:-portal} -d ${PORTAL_DB_NAME:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  portal-redis:
    image: redis:7-alpine
    container_name: portal_redis
    restart: always
    volumes:
      - portal_redis_data:/data
    networks:
      - scratch_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal-web:
    build:
      context: ../internal-portal
      dockerfile: Dockerfile
    image: scratchsolid-portal:latest
    container_name: portal_web
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal.rule=Host(`portal.scratchsolidsolutions.org`)"
      - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portal.entrypoints=websecure"
      - "traefik.http.services.portal.loadbalancer.server.port=3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Both logical DBs (scratchsolid_db + training_db) share one Postgres
      # instance; training tables live alongside portal tables.
      DATABASE_URL: postgresql://${PORTAL_DB_USER:-portal}:${PORTAL_DB_PASSWORD}@portal-postgres:5432/${PORTAL_DB_NAME:-portal}
      REDIS_URL: redis://portal-redis:6379
      S3_ENDPOINT: ${R2_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      S3_BUCKET: ${PORTAL_UPLOADS_BUCKET:-scratchsolid-uploads}
      S3_PHOTOS_BUCKET: ${PORTAL_PHOTOS_BUCKET:-scratchsolid-uploads}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-https://uploads.scratchsolidsolutions.org}
      NEXT_PUBLIC_BASE_URL: ${PORTAL_BASE_URL:-https://portal.scratchsolidsolutions.org}
      NEXT_PUBLIC_API_URL: ${MARKETING_API_URL:-https://api.scratchsolidsolutions.org/api}
      ALLOWED_ORIGINS: ${PORTAL_BASE_URL:-https://portal.scratchsolidsolutions.org}
      JWT_SECRET: ${JWT_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      INTERNAL_PORTAL_N8N_WEBHOOK_SECRET: ${INTERNAL_PORTAL_N8N_WEBHOOK_SECRET}
      # Zoho Books / CRM
      ZOHO_ORG_ID: ${ZOHO_ORG_ID:-}
      ZOHO_CLIENT_ID: ${ZOHO_CLIENT_ID:-}
      ZOHO_CLIENT_SECRET: ${ZOHO_CLIENT_SECRET:-}
      ZOHO_REFRESH_TOKEN: ${ZOHO_REFRESH_TOKEN:-}
      # ERPNext
      ERPNEXT_BASE_URL: ${ERPNEXT_BASE_URL:-}
      ERPNEXT_API_KEY: ${ERPNEXT_API_KEY:-}
      ERPNEXT_API_SECRET: ${ERPNEXT_API_SECRET:-}
      # Meta WhatsApp Cloud API
      META_WABA_ID: ${META_WABA_ID:-}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
    depends_on:
      portal-postgres:
        condition: service_healthy
      portal-redis:
        condition: service_started
    networks:
      - scratch_internal
      - scratch_public

# ═════════════════════════════════════════════════════════════════
#  VOLUMES
