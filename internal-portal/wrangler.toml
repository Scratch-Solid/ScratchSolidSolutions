name = "scratchsolid-portal"
pages_build_output_dir = ".next"

[vars]
# Secrets are set via Cloudflare dashboard/API to prevent overwriting during deployment
# JWT_SECRET should be set as secret_text in Cloudflare
CSRF_SECRET = "your-csrf-secret-here-change-in-production"
ZOHO_AUTH_TOKEN = "your-zoho-auth-token"
ZOHO_ORG_ID = "your-zoho-org-id"
ZOHO_CLIENT_ID = "your-zoho-client-id"
ZOHO_CLIENT_SECRET = "your-zoho-client-secret"
ZOHO_REFRESH_TOKEN = "your-zoho-refresh-token"
WHATSAPP_API_KEY = "your-whatsapp-api-key"
WHATSAPP_PHONE_ID = "your-whatsapp-phone-id"
EMAIL_API_KEY = "your-email-api-key"
EMAIL_FROM = "noreply@scratchsolid.co.za"

[[d1_databases]]
binding = "scratchsolid_db"
database_name = "scratchsolid-db"
database_id = "0b0b6006-1b2d-4ab1-8909-dc684666e6d3"

[env.production]
name = "scratchsolid-portal"
