name = "cleaning-service-backend"
main = "src/index.ts"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

# Deploy trigger: Update to apply new scratchsolid-backend-db configuration

[triggers]
crons = ["0 0 * * *"]

# Global Bindings (Production / Base)
[[d1_databases]]
binding = "DB"
database_name = "scratchsolid-backend-db"
database_id = "2a0b1e08-443e-46c4-8184-86ea180d4024"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "899aa84ac7854b59b17c3058d2926170"

[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "backend-uploads"

[vars]
ENVIRONMENT = "production"
NEXT_PUBLIC_BASE_URL = "https://scratchsolidsolutions.org"
NEXT_PUBLIC_API_URL = "https://api.scratchsolidsolutions.org/api"

[[routes]]
pattern = "api.scratchsolidsolutions.org/*"
zone_name = "scratchsolidsolutions.org"

[[queues.consumers]]
queue = "backend-writes-queue"
max_batch_size = 100
max_batch_timeout = 5

# Staging environment configuration
[env.staging]
name = "cleaning-service-backend-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "scratchsolid-db-backend-staging"
database_id = "67e66542-486a-442b-bbf6-9c3d4a503f4c"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "f077cd7dd76843e680853ffe41bdbdaa"

[[env.staging.r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "backend-uploads-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
NEXT_PUBLIC_BASE_URL = "https://staging.scratchsolidsolutions.org"
NEXT_PUBLIC_API_URL = "https://api-staging.scratchsolidsolutions.org/api"

[[env.staging.routes]]
pattern = "api-staging.scratchsolidsolutions.org/*"
zone_name = "scratchsolidsolutions.org"

[[env.staging.queues.consumers]]
queue = "backend-writes-queue-staging"
max_batch_size = 100
max_batch_timeout = 5

# Production environment explicit configuration
[env.production]
name = "cleaning-service-backend-prod"

# Secrets (must be set via: wrangler secret put <SECRET_NAME>)
# Required secrets:
# - JWT_SECRET
# - CSRF_SECRET
# - RESEND_API_KEY
# - ZOHO_CLIENT_SECRET
# - ZOHO_ORG_ID
# - ZOHO_REFRESH_TOKEN
