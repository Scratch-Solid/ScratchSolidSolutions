name = "cleaning-service-backend"
main = "src/index.js"
compatibility_date = "2026-04-19"

[env.production]
name = "cleaning-service-backend-prod"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "scratchsolid-db"
database_id = "0b0b6006-1b2d-4ab1-8909-dc684666e6d3"

# KV Namespace bindings
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "859744ffa6fc44caa84edaaa1e481800"

# Environment variables
[vars]
ENVIRONMENT = "production"
NEXT_PUBLIC_BASE_URL = "https://scratchsolidsolutions.org"
NEXT_PUBLIC_API_URL = "https://api.scratchsolidsolutions.org/api"

# Secrets (must be set via: wrangler secret put <SECRET_NAME>)
# Required secrets:
# - JWT_SECRET
# - CSRF_SECRET
# - RESEND_API_KEY
# - ZOHO_CLIENT_SECRET
# - ZOHO_ORG_ID
# - ZOHO_REFRESH_TOKEN

